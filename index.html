<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的工具箱 - AI工具导航</title>
    <meta name="description" content="收录优质AI工具，助力效率提升">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bg-gradient"></div>
    
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🧰</span>
                    <h1 id="siteName">我的工具箱</h1>
                </div>
                <p class="tagline" id="siteDescription">收录优质AI工具，助力效率提升</p>
            </div>
            
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="搜索AI工具..." autocomplete="off">
                <span class="search-hint">按 Enter 搜索</span>
            </div>
            
            <nav class="category-nav" id="categoryNav">
                <button class="category-btn active" data-category="all">
                    <span>全部</span>
                </button>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <section class="tools-section" id="toolsSection">
                <!-- Tools will be rendered here -->
            </section>
            
            <div class="no-results" id="noResults" style="display: none;">
                <div class="no-results-icon">🔍</div>
                <h3>没有找到相关工具</h3>
                <p>试试其他关键词，或浏览全部分类</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>Made with ❤️ by <span id="authorName">libaofeng</span></p>
            <p class="footer-tip">📝 增删工具请编辑 <code>data/tools.json</code> 文件</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
